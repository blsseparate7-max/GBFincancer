<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>GBFinancer - AI Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b141a" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GBFinancer">
    <link rel="apple-touch-icon" href="https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Kill Switch para Service Worker problemático
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      
      // Limpeza de cache forçada se houver erro crítico
      window.addEventListener('error', function(e) {
        if (e.message.indexOf('Loading chunk') > -1 || e.message.indexOf('unexpected token') > -1) {
          console.warn('Erro de carregamento de asset detectado. Limpando cache e recarregando...');
          if (window.caches) {
            caches.keys().then(function(names) {
              for (let name of names) caches.delete(name);
            });
          }
          window.location.reload();
        }
      }, true);
    </script>
</body>
</html>
